name: Release

on:
  workflow_dispatch:
    inputs:
      release:
        description: Release type
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      npm_tag:
        description: npm dist-tag for publication
        required: true
        default: latest
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release branch and npm tag
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        run: |
          if [ "$NPM_TAG" = "latest" ] && [ "$GITHUB_REF_NAME" != "master" ]; then
            echo "Release to npm tag 'latest' must be started from the master branch."
            exit 1
          fi

      - name: Setup Node.js for release
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Show Docker Compose version
        run: docker compose version

      - name: Setup project
        uses: ./.github/actions/setup

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run release checks
        run: |
          make lint
          make typecheck
          make test

      - name: Run release script
        env:
          RELEASE_TYPE: ${{ inputs.release }}
        run: |
          case "$RELEASE_TYPE" in
            auto)
              RELEASE_SCRIPT="release"
              ;;
            patch)
              RELEASE_SCRIPT="release:patch"
              ;;
            minor)
              RELEASE_SCRIPT="release:minor"
              ;;
            major)
              RELEASE_SCRIPT="release:major"
              ;;
            *)
              echo "Unknown release type: $RELEASE_TYPE"
              exit 1
              ;;
          esac

          yarn run "$RELEASE_SCRIPT"

      - name: Build package
        run: make build

      - name: Push release commit and tags
        run: git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags

      - name: Publish package to npm
        env:
          NPM_TAG: ${{ inputs.npm_tag }}
        run: npm publish --tag "$NPM_TAG"
